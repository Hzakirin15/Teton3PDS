<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP3 Player</title>
    <link rel="stylesheet" href="MP3song.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>MP3 Player</h1>
        </header>
        
        <div class="player-controls">
            <audio id="audio-player" controls style="display: none;"></audio>
            <div class="now-playing">
                <span id="current-song">No song selected</span>
            </div>
            <div class="controls">
                <button id="play-btn" class="control-btn">Play</button>
                <button id="pause-btn" class="control-btn">Pause</button>
                <button id="stop-btn" class="control-btn">Stop</button>
            </div>
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress"></div>
                </div>
                <span class="time-display" id="current-time">0:00</span>
                <span class="time-display" id="total-time">0:00</span>
            </div>
        </div>
        
        <div class="songs-list">
            <h2>Available Songs</h2>
            <ul id="songs-container">
                <!-- Songs will be populated by JavaScript -->
            </ul>
        </div>
    </div>

    <script src="MP3song.js"></script>
</body>
</html>
