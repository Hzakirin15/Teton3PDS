<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>RN IN · tablet</title>
  <!-- separate CSS: rnin.css -->
  <link rel="stylesheet" href="rnin.css">
</head>
<body>
  <div class="app-container">
    <!-- header: RN IN with back button -->
    <header class="app-header">
      <div class="header-left">
        <a href="http://127.0.0.1:3000/mainpage2.html?vscode-livepreview=true" class="back-button" title="Go back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          
        </a>
        <h1>RN IN</h1>
      </div>
      <span class="badge">E-Work</span>
    </header>

    <!-- main card (tablet style) -->
    <main class="card">

      <!-- BIG FILL RECTANGLE: user paste / type the full template text -->
      <section class="fill-rectangle">
        <h3> paste template text</h3>
        <div class="big-input-wrapper">
          <textarea id="templateInput" placeholder="Paste the full template text here .."></textarea>
        </div>

        <!-- action row: extract + error code selector + copy -->
        <div class="action-row">
          <button id="extractBtn" class="primary-btn">🔍 extract </button>
          <div class="error-select-group">
            <label for="errorCodeSelect">Error code</label>
            <select id="errorCodeSelect">
              <option value="PXE-020" selected>PXE-020</option>
              <option value="K2V5-031">K2V5-031</option>
              <option value="RISER-031">RISER-031</option>
              <option value="SMC-031">SMC-031</option>
            </select>
          </div>
          <button id="copyTemplateBtn" class="copy-btn">📄 copy </button>
        </div>

        <div id="feedback" class="feedback-message"></div>
      </section>

    </main>

    <footer class="app-footer">
      <span>Template for request RN IN in Teams group Amber</span>
    </footer>
  </div>

  <!-- separate JavaScript: rnin.js -->
  <script src="rnin.js"></script>
</body>
</html>
