<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Game</title>
    <link rel="stylesheet" href="soduko.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-th"></i> Sudoku Challenge</h1>
            <p class="subtitle">Test your logic skills across nine difficulty levels</p>
        </header>
        
        <div class="game-area">
            <div class="left-panel">
                <div class="game-info">
                    <div class="info-card">
                        <h3><i class="fas fa-clock"></i> Time</h3>
                        <div class="time-display" id="timeDisplay">00:00</div>
                    </div>
                    
                    <div class="info-card">
                        <h3><i class="fas fa-star"></i> Score</h3>
                        <div class="score-display" id="scoreDisplay">0</div>
                    </div>
                    
                    <div class="info-card">
                        <h3><i class="fas fa-chart-line"></i> Level</h3>
                        <div class="level-display" id="levelDisplay">Easy</div>
                    </div>
                </div>
                
                <div class="controls">
                    <div class="difficulty-selector">
                        <h3><i class="fas fa-sliders-h"></i> Difficulty Level</h3>
                        <div class="difficulty-buttons" id="difficultyButtons">
                            <!-- Difficulty buttons will be generated by JavaScript -->
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <button id="startBtn" class="btn start-btn">
                            <i class="fas fa-play"></i> Start Game
                        </button>
                        <button id="pauseBtn" class="btn pause-btn">
                            <i class="fas fa-pause"></i> Pause
                        </button>
                        <button id="resetBtn" class="btn reset-btn">
                            <i class="fas fa-redo"></i> Reset
                        </button>
                        <button id="hintBtn" class="btn hint-btn">
                            <i class="fas fa-lightbulb"></i> Hint
                        </button>
                        <button id="solutionBtn" class="btn solution-btn">
                            <i class="fas fa-check-circle"></i> Show Solution
                        </button>
                    </div>
                </div>
                
                <div class="number-selector">
                    <h3><i class="fas fa-keyboard"></i> Number Pad</h3>
                    <div class="number-buttons">
                        <button class="num-btn" data-value="1">1</button>
                        <button class="num-btn" data-value="2">2</button>
                        <button class="num-btn" data-value="3">3</button>
                        <button class="num-btn" data-value="4">4</button>
                        <button class="num-btn" data-value="5">5</button>
                        <button class="num-btn" data-value="6">6</button>
                        <button class="num-btn" data-value="7">7</button>
                        <button class="num-btn" data-value="8">8</button>
                        <button class="num-btn" data-value="9">9</button>
                        <button class="num-btn clear-btn" data-value="0">
                            <i class="fas fa-eraser"></i> Clear
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="game-board">
                <div class="sudoku-grid" id="sudokuGrid">
                    <!-- Sudoku grid will be generated by JavaScript -->
                </div>
                
                <div class="game-status" id="gameStatus">
                    <p>Click "Start Game" to begin your Sudoku challenge!</p>
                </div>
            </div>
        </div>
        
        <footer>
            <p>Sudoku Challenge &copy; 2023 | Game saves automatically to browser memory</p>
        </footer>
    </div>

    <script src="soduko.js"></script>
</body>
</html>
